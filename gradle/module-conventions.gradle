// Apply common logic to all module build files

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.withType(Sign).configureEach {
  dependsOn(":composedJar")
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(17))
    }
}

kotlin {
    jvmToolchain(17)
}

tasks {
  cyclonedxDirectBom {
    includeConfigs.set(List.of("runtimeClasspath"))
    xmlOutput.unsetConvention()
    mustRunAfter(getTasksByName("buildPluginBlockmap", true))
  }
}

var bomFile = layout.buildDirectory.file("reports/cyclonedx-direct/bom.json")
artifacts.add("archives", bomFile.get().asFile) {
    name = "sonarlint-intellij"
    type = "json"
    classifier = "cyclonedx"
    builtBy("cyclonedxDirectBom")
}

license {
    header = rootProject.file("HEADER")
    mapping(
      Map.of(
        "java", "SLASHSTAR_STYLE",
        "kt", "SLASHSTAR_STYLE",
        "svg", "XML_STYLE",
        "form", "XML_STYLE"
      )
    )
    excludes(List.of("**/*.jar", "**/*.png", "**/README"))
    strictCheck = true
}
