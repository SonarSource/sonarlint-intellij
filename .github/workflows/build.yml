name: Build
on:
  push:
    branches:
      - master
      - branch-*
      - dogfood-*
  pull_request:
  workflow_dispatch:

concurrency:
  group: >-
    ${{ github.workflow }}-
    ${{ github.event.pull_request.base.ref || 'push' }}-
    ${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  checks: write

env:
  CACHE_BACKEND: s3

jobs:
  build-number:
    outputs:
      BUILD_NUMBER: ${{ steps.build-number.outputs.BUILD_NUMBER }}
    runs-on: sonar-xs
    name: Get build number
    permissions:
      id-token: write
    steps:
      - uses: SonarSource/ci-github-actions/get-build-number@23d3a5700259f9890438851083904c6d5e87ff4e # 1.3.34
        id: build-number

  aws-auth:
    runs-on: sonar-xs
    permissions:
      id-token: write
    outputs:
      # Note: Output key names are generated by aws-actions/amazon-ecr-login and include the registry URL (with account ID).
      # These cannot be templated due to GitHub Actions limitations.
      docker_username: ${{ steps.login-ecr.outputs.docker_username_275878209202_dkr_ecr_eu_central_1_amazonaws_com }}
      docker_password: ${{ steps.login-ecr.outputs.docker_password_275878209202_dkr_ecr_eu_central_1_amazonaws_com }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: eu-central-1
          role-to-assume: arn:aws:iam::275878209202:role/deploymentroles/DevInfraSquadDockerImagesAccessRole

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a # v2.1.3
        with:
          mask-password: 'false'

  build-plugin:
    runs-on: warp-custom-ubuntu-24-04
    container:
      image: 275878209202.dkr.ecr.eu-central-1.amazonaws.com/sonarlint-intellij:20260410161051
      options: --user runner
      credentials:
        username: ${{ needs.aws-auth.outputs.docker_username }}
        password: ${{ needs.aws-auth.outputs.docker_password }}
    defaults:
      run:
        shell: bash
    needs:
      - build-number
      - aws-auth
    name: Build Plugin
    outputs:
      PROJECT_VERSION: ${{ steps.set_version.outputs.project-version }}
    env:
      BUILD_NUMBER: ${{ needs.build-number.outputs.BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.9.12

      - name: Export embedded IDE paths from container
        run: |
          echo "IDEA_HOME=${IDEA_2024_DIR}" >> $GITHUB_ENV
          echo "CLION_HOME=${CLION_2024_DIR}" >> $GITHUB_ENV
          echo "RIDER_HOME=${RIDER_2024_DIR}" >> $GITHUB_ENV
          echo "ULTIMATE_HOME=${IDEA_ULTIMATE_2024_DIR}" >> $GITHUB_ENV

      - name: Build Plugin
        uses: SonarSource/ci-github-actions/build-gradle@23d3a5700259f9890438851083904c6d5e87ff4e # 1.3.34
        id: build_plugin
        with:
          sonar-platform: none
          deploy-pull-request: true
          use-develocity: true
          develocity-url: https://develocity.sonar.build
          artifactory-reader-role: private-reader
          artifactory-deployer-role: qa-deployer
          gradle-args: -x test -x :its:check :buildPlugin :cyclonedxBom
          cache-paths: |
            /home/runner/.gradle/caches
            /home/runner/.gradle/wrapper

      - name: Set project version output
        id: set_version
        run: echo "project-version=${PROJECT_VERSION}" >> $GITHUB_OUTPUT

  check_windows:
    runs-on: warp-custom-sonarlint-intellij
    needs: build-number
    name: Test Windows
    env:
      BUILD_NUMBER: ${{ needs.build-number.outputs.BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.9.12

      - name: Fetch vault secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@c154b4a417b51cb98dd71137f49bf20e77c56820 # 3.4.0
        with:
          secrets: |
            development/kv/data/repox url | ARTIFACTORY_URL;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader username | ARTIFACTORY_USER;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader access_token | ARTIFACTORY_ACCESS_TOKEN;

      - name: Run checks
        env:
          ARTIFACTORY_URL: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_URL }}
          ARTIFACTORY_ACCESS_USERNAME: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_USER }}
          ARTIFACTORY_ACCESS_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_ACCESS_TOKEN }}
          IDEA_HOME: C:\Program Files\intellij
          RIDER_HOME: C:\Program Files\rider
          CLION_HOME: C:\Program Files\clion
          ULTIMATE_HOME: C:\Program Files\ultimate
        run: .\gradlew.bat :check

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        if: ${{ !cancelled() }}
        with:
          report_paths: '**/test-results/**/*.xml'

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports-windows
          path: "**/reports/**/**"

      - name: Upload JUnit test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-results-windows
          path: "**/test-results/**/*.xml"

  test-and-sonar:
    runs-on: warp-custom-ubuntu-24-04
    container:
      image: 275878209202.dkr.ecr.eu-central-1.amazonaws.com/sonarlint-intellij:20260410161051
      options: --user runner
      credentials:
        username: ${{ needs.aws-auth.outputs.docker_username }}
        password: ${{ needs.aws-auth.outputs.docker_password }}
    defaults:
      run:
        shell: bash
    name: Tests and Sonar
    needs:
      - build-plugin
      - build-number
      - aws-auth
    env:
      BUILD_NUMBER: ${{ needs.build-number.outputs.BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Full history needed for Sonar blame

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.9.12

      - name: Export embedded IDE paths from container
        run: |
          echo "IDEA_HOME=${IDEA_2024_DIR}" >> $GITHUB_ENV
          echo "CLION_HOME=${CLION_2024_DIR}" >> $GITHUB_ENV
          echo "RIDER_HOME=${RIDER_2024_DIR}" >> $GITHUB_ENV
          echo "ULTIMATE_HOME=${IDEA_ULTIMATE_2024_DIR}" >> $GITHUB_ENV

      - name: Run Tests and Sonar Analysis
        uses: SonarSource/ci-github-actions/build-gradle@23d3a5700259f9890438851083904c6d5e87ff4e # 1.3.34
        with:
          deploy: false
          use-develocity: true
          develocity-url: https://develocity.sonar.build
          artifactory-reader-role: private-reader
          gradle-args: -x :its:check -x :buildPlugin -x :buildPluginBlockmap -x :cyclonedxBom check jacocoTestReport
          cache-paths: |
            /home/runner/.gradle/caches
            /home/runner/.gradle/wrapper

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        if: ${{ !cancelled() }}
        with:
          report_paths: '**/test-results/**/*.xml'

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports-linux
          path: "**/reports/**/**"

      - name: Upload JUnit test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-results-linux
          path: "**/test-results/**/*.xml"

  verify-plugin:
    runs-on: warp-custom-ubuntu-24-04
    container:
      image: 275878209202.dkr.ecr.eu-central-1.amazonaws.com/sonarlint-intellij:20260410161051
      options: --user runner
      credentials:
        username: ${{ needs.aws-auth.outputs.docker_username }}
        password: ${{ needs.aws-auth.outputs.docker_password }}
    defaults:
      run:
        shell: bash
    name: Verify Plugin
    needs:
      - build-plugin
      - build-number
      - aws-auth
    env:
      BUILD_NUMBER: ${{ needs.build-number.outputs.BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.9.12

      - name: Export embedded IDE paths from container
        run: |
          echo "IDEA_HOME=${IDEA_2024_DIR}" >> $GITHUB_ENV
          echo "CLION_HOME=${CLION_2024_DIR}" >> $GITHUB_ENV
          echo "RIDER_HOME=${RIDER_2024_DIR}" >> $GITHUB_ENV
          echo "ULTIMATE_HOME=${IDEA_ULTIMATE_2024_DIR}" >> $GITHUB_ENV

      - name: Restore verifier IDEs cache
        uses: SonarSource/gh-action_cache@55df12d329333911afa3e89a9b558fbf47dcd61c # v1.4.4
        with:
          path: /home/runner/.gradle/caches/*/transforms/
          key: verifier-ides-${{ runner.os }}-IU-CL-RD-${{ hashFiles('gradle.properties') }}
          restore-keys: |
            verifier-ides-${{ runner.os }}-

      - name: Verify Plugin Compatibility
        uses: SonarSource/ci-github-actions/build-gradle@23d3a5700259f9890438851083904c6d5e87ff4e # 1.3.34
        with:
          deploy: false
          sonar-platform: none
          use-develocity: true
          develocity-url: https://develocity.sonar.build
          artifactory-reader-role: private-reader
          gradle-args: -x test -x check -x :its:check :verifyPlugin -PverifierEnv=CI
          cache-paths: |
            /home/runner/.gradle/caches
            !/home/runner/.gradle/caches/*/transforms/
            /home/runner/.gradle/wrapper

  setup-matrix:
    runs-on: sonar-xs
    name: Setup QA matrix
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build QA matrix from gradle.properties
        id: set-matrix
        run: |
          MIN=$(grep '^minSupportedIdeVersion=' gradle.properties | cut -d= -f2)
          LATEST=$(grep '^latestStableIdeVersion=' gradle.properties | cut -d= -f2)
          MATRIX=$(jq -nc --arg min "$MIN" --arg lat "$LATEST" \
            '[{"ide_version":"IU-"+$min,"qa_category":"IdeaUltimateMin"},
              {"ide_version":"IU-"+$lat,"qa_category":"IdeaUltimateLatest"},
              {"ide_version":"CL-"+$min,"qa_category":"CLionMin"},
              {"ide_version":"CL-"+$lat,"qa_category":"CLionLatest"},
              {"ide_version":"RD-"+$min,"qa_category":"RiderMin"},
              {"ide_version":"RD-"+$lat,"qa_category":"RiderLatest"}]')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  qa:
    runs-on: warp-custom-ubuntu-24-04
    container:
      image: 275878209202.dkr.ecr.eu-central-1.amazonaws.com/sonarlint-intellij:20260410161051
      options: --user runner
      credentials:
        username: ${{ needs.aws-auth.outputs.docker_username }}
        password: ${{ needs.aws-auth.outputs.docker_password }}
    defaults:
      run:
        shell: bash
    name: Run ITs - ${{ matrix.ide_version }} - ${{ matrix.qa_category }}
    needs:
      - build-plugin
      - build-number
      - aws-auth
      - setup-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    env:
      DISPLAY: ':10'
    steps:
      - uses: ./.github/actions/run-qa-its
        with:
          ide_version: ${{ matrix.ide_version }}
          qa_category: ${{ matrix.qa_category }}
          project_version: ${{ needs.build-plugin.outputs.PROJECT_VERSION }}
          build_number: ${{ needs.build-number.outputs.BUILD_NUMBER }}

  promote:
    runs-on: sonar-xs
    name: Promote
    needs:
      - build-number
      - build-plugin
      - test-and-sonar
      - check_windows
      - verify-plugin
      - qa
    if: ${{ github.event_name == 'pull_request' || github.ref_name == github.event.repository.default_branch || startsWith(github.ref_name, 'branch-') || startsWith(github.ref_name, 'dogfood-on-') }}
    env:
      BUILD_NUMBER: ${{ needs.build-number.outputs.BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.9.12

      - name: Promote artifacts
        uses: SonarSource/ci-github-actions/promote@23d3a5700259f9890438851083904c6d5e87ff4e # 1.3.34
        env:
          PROJECT_VERSION: ${{ needs.build-plugin.outputs.PROJECT_VERSION }}
        with:
          promote-pull-request: true

  dogfood:
    runs-on: sonar-xs
    name: Update Dogfood Repository
    needs:
      - build-number
      - build-plugin
      - promote
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    env:
      BUILD_NUMBER: ${{ needs.build-number.outputs.BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.9.12
          experimental: true

      - name: Fetch vault secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@c154b4a417b51cb98dd71137f49bf20e77c56820 # 3.4.0
        with:
          secrets: |
            development/kv/data/repox url | ARTIFACTORY_URL;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-promoter access_token | ARTIFACTORY_API_KEY;

      - name: Update dogfood repository
        env:
          ARTIFACTORY_URL: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_URL }}
          ARTIFACTORY_API_KEY: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_API_KEY }}
          PROJECT_VERSION: ${{ needs.build-plugin.outputs.PROJECT_VERSION }}
        run: |
          cat > updatePlugins.xml << EOF
          <plugins>
            <plugin id="org.sonarlint.idea" url="${ARTIFACTORY_URL}/sonarsource/org/sonarsource/sonarlint/intellij/sonarlint-intellij/${PROJECT_VERSION}/sonarlint-intellij-${PROJECT_VERSION}.zip" version="${PROJECT_VERSION}"/>
          </plugins>
          EOF
          cat updatePlugins.xml
          
          # Upload to Artifactory using jfrog CLI
          jf rt u updatePlugins.xml \
            sonarsource-public-builds/org/sonarsource/sonarlint/intellij/sonarlint-intellij/ \
            --url "${ARTIFACTORY_URL}" \
            --access-token "${ARTIFACTORY_API_KEY}" \
            --build-name "${{ github.event.repository.name }}" \
            --build-number "$BUILD_NUMBER"
