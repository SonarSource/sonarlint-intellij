name: Integration Tests EAP

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  checks: write

env:
  CACHE_BACKEND: s3

jobs:
  build-number:
    outputs:
      BUILD_NUMBER: ${{ steps.build-number.outputs.BUILD_NUMBER }}
    runs-on: sonar-xs
    name: Get build number
    permissions:
      id-token: write
    steps:
      - uses: SonarSource/ci-github-actions/get-build-number@23d3a5700259f9890438851083904c6d5e87ff4e # 1.3.34
        id: build-number

  aws-auth:
    runs-on: sonar-xs
    permissions:
      id-token: write
    outputs:
      docker_username: ${{ steps.login-ecr.outputs.docker_username_275878209202_dkr_ecr_eu_central_1_amazonaws_com }}
      docker_password: ${{ steps.login-ecr.outputs.docker_password_275878209202_dkr_ecr_eu_central_1_amazonaws_com }}
    steps:
      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: eu-central-1
          role-to-assume: arn:aws:iam::275878209202:role/deploymentroles/DevInfraSquadDockerImagesAccessRole

      - uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a # v2.1.3
        id: login-ecr
        with:
          mask-password: 'false'

  build-plugin:
    runs-on: warp-custom-ubuntu-24-04
    container:
      image: 275878209202.dkr.ecr.eu-central-1.amazonaws.com/sonarlint-intellij:20260410161051
      options: --user runner
      credentials:
        username: ${{ needs.aws-auth.outputs.docker_username }}
        password: ${{ needs.aws-auth.outputs.docker_password }}
    needs:
      - build-number
      - aws-auth
    name: Build Plugin
    if: github.ref_name == github.event.repository.default_branch || github.event_name == 'workflow_dispatch'
    outputs:
      PROJECT_VERSION: ${{ steps.set_version.outputs.project-version }}
    env:
      BUILD_NUMBER: ${{ needs.build-number.outputs.BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.9.12

      - name: Export embedded IDE paths from container
        run: |
          echo "IDEA_HOME=${IDEA_2024_DIR}" >> $GITHUB_ENV
          echo "CLION_HOME=${CLION_2024_DIR}" >> $GITHUB_ENV
          echo "RIDER_HOME=${RIDER_2024_DIR}" >> $GITHUB_ENV
          echo "ULTIMATE_HOME=${IDEA_ULTIMATE_2024_DIR}" >> $GITHUB_ENV

      - uses: SonarSource/ci-github-actions/build-gradle@23d3a5700259f9890438851083904c6d5e87ff4e # 1.3.34
        id: build_plugin
        with:
          sonar-platform: none
          deploy: false
          use-develocity: true
          develocity-url: https://develocity.sonar.build
          artifactory-reader-role: private-reader
          gradle-args: -x test -x :its:check :buildPlugin

      - name: Set project version output
        id: set_version
        run: echo "project-version=${PROJECT_VERSION}" >> $GITHUB_OUTPUT

      - name: Upload built plugin
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eap-plugin
          path: build/distributions/sonarlint-intellij-*.zip

  setup-matrix:
    runs-on: sonar-xs
    name: Setup EAP matrix
    if: github.ref_name == github.event.repository.default_branch || github.event_name == 'workflow_dispatch'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build EAP matrix from gradle.properties
        id: set-matrix
        run: |
          EAP=$(grep '^eapIdeVersion=' gradle.properties | cut -d= -f2 | cut -d'#' -f1 | xargs)
          MATRIX=$(jq -nc --arg eap "$EAP" \
            '[{"ide_version":("IU-" + $eap),"qa_category":"IdeaUltimateEAP"},
              {"ide_version":("CL-" + $eap),"qa_category":"CLionEAP"},
              {"ide_version":("RD-" + $eap),"qa_category":"RiderEAP"}]')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  qa-eap:
    runs-on: warp-custom-ubuntu-24-04
    container:
      image: 275878209202.dkr.ecr.eu-central-1.amazonaws.com/sonarlint-intellij:20260410161051
      options: --user runner
      credentials:
        username: ${{ needs.aws-auth.outputs.docker_username }}
        password: ${{ needs.aws-auth.outputs.docker_password }}
    name: EAP ITs - ${{ matrix.ide_version }}
    needs:
      - setup-matrix
      - build-plugin
      - build-number
      - aws-auth
    if: github.ref_name == github.event.repository.default_branch || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    env:
      DISPLAY: ':10'
    steps:
      - uses: ./.github/actions/run-qa-its
        with:
          ide_version: ${{ matrix.ide_version }}
          qa_category: ${{ matrix.qa_category }}
          project_version: ${{ needs.build-plugin.outputs.PROJECT_VERSION }}
          build_number: ${{ needs.build-number.outputs.BUILD_NUMBER }}
          plugin_artifact: eap-plugin
          record_video_on_failure: 'true'

  verify-eap:
    runs-on: sonar-m
    name: Verify Plugin - EAP
    needs:
      - setup-matrix
      - build-plugin
      - build-number
      - aws-auth
    if: github.ref_name == github.event.repository.default_branch || github.event_name == 'workflow_dispatch'
    env:
      BUILD_NUMBER: ${{ needs.build-number.outputs.BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.9.12

      - name: Restore verifier IDEs cache
        uses: SonarSource/gh-action_cache@55df12d329333911afa3e89a9b558fbf47dcd61c # v1.4.4
        with:
          path: ~/.gradle/caches/*/transforms/
          key: verifier-ides-${{ runner.os }}-EAP-${{ hashFiles('gradle.properties', 'build.gradle.kts') }}
          restore-keys: |
            verifier-ides-${{ runner.os }}-EAP-
            verifier-ides-${{ runner.os }}-

      - name: Fetch vault secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@c154b4a417b51cb98dd71137f49bf20e77c56820 # 3.4.0
        with:
          secrets: |
            development/kv/data/repox url | ARTIFACTORY_URL;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader username | ARTIFACTORY_USER;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader access_token | ARTIFACTORY_ACCESS_TOKEN;
            development/kv/data/develocity token | DEVELOCITY_TOKEN;

      - uses: SonarSource/ci-github-actions/build-gradle@23d3a5700259f9890438851083904c6d5e87ff4e # 1.3.34
        env:
          BUILD_NUMBER: ${{ needs.build-number.outputs.BUILD_NUMBER }}
        with:
          sonar-platform: none
          deploy: false
          use-develocity: true
          develocity-url: https://develocity.sonar.build
          artifactory-reader-role: private-reader
          gradle-args: -x test -x :its:check :buildPlugin :verifyPlugin -PverifierEnv=EAP

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verifier-reports-eap
          path: "**/reports/**/*"
          if-no-files-found: warn
