name: Full release

on:
  workflow_dispatch:
    inputs:
      short-description:
        description: 'A short description for the release ticket'
        required: true
        type: string
      branch:
        description: 'The branch from which to release.'
        required: false
        default: 'master'
        type: string

jobs:
  release:
    name: Release
    uses: SonarSource/release-github-actions/.github/workflows/ide-automated-release.yml@7dd4782e88df1ac018969c71a89266c0d36dd758 # 1.7.2
    permissions:
      statuses: read
      id-token: write
      contents: write
      actions: write
      pull-requests: write
    with:
      jira-project-key: "SLI"
      project-name: "SonarQube for IntelliJ"
      short-description: ${{ inputs.short-description }}
      branch: ${{ inputs.branch }}
      slack-channel: "C06M15TJN30" #squad-ide-intellij-family-bots

  bump-version:
    name: Bump version
    needs:
      - release
    runs-on: github-ubuntu-latest-m
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: SonarSource/release-github-actions/bump-version@7dd4782e88df1ac018969c71a89266c0d36dd758 # 1.7.2
        with:
          version: ${{ needs.release.outputs.new-version }}
          base-branch: ${{ inputs.branch }}
          token: ${{ github.token }}
          excluded-modules: its
