name: Plugin Verifier Nightly

on:
  schedule:
    - cron: '0 0 * * 4'  # Every Thursdays at midnight UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

env:
  CACHE_BACKEND: s3

jobs:
  verify_plugin:
    runs-on: sonar-m
    name: Verify Plugin - LATEST
    if: github.ref_name == github.event.repository.default_branch
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2025.9.12

      # Cache verifier IDE binaries separately with a stable key (not invalidated by unrelated Gradle changes)
      # IDEs are stored by the IntelliJ Platform Gradle Plugin v2.x in ~/.gradle/caches/<gradle-version>/transforms/
      - name: Restore verifier IDEs cache
        uses: SonarSource/gh-action_cache@v1
        with:
          path: ~/.gradle/caches/*/transforms/
          key: verifier-ides-${{ runner.os }}-LATEST-${{ hashFiles('build.gradle.kts', 'gradle.properties') }}
          restore-keys: |
            verifier-ides-${{ runner.os }}-LATEST-
            verifier-ides-${{ runner.os }}-

      - name: Cache Gradle
        uses: SonarSource/gh-action_cache@v1
        with:
          path: |
            ~/.gradle/caches
            !~/.gradle/caches/*/transforms/
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-nightly-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-nightly-
            gradle-${{ runner.os }}-

      - name: Fetch vault secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/kv/data/repox url | ARTIFACTORY_URL;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader username | ARTIFACTORY_USER;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader access_token | ARTIFACTORY_ACCESS_TOKEN;
            development/kv/data/develocity token | DEVELOCITY_TOKEN;

      - name: Run plugin verifier
        env:
          ARTIFACTORY_URL: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_URL }}
          ARTIFACTORY_ACCESS_USERNAME: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_USER }}
          ARTIFACTORY_ACCESS_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_ACCESS_TOKEN }}
          DEVELOCITY_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).DEVELOCITY_TOKEN }}
          DEVELOCITY_ACCESS_KEY: develocity.sonar.build=${{ fromJSON(steps.secrets.outputs.vault).DEVELOCITY_TOKEN }}
        run: ./gradlew :verifyPlugin -PverifierEnv=LATEST

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: verifier-reports-latest
          path: "**/reports/**/*"
          if-no-files-found: warn
