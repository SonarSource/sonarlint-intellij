name: Plugin Verifier Nightly

on:
  schedule:
    - cron: '0 0 * * 4'  # Every Thursdays at midnight UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

env:
  CACHE_BACKEND: s3

jobs:
  verify_plugin:
    runs-on: sonar-m
    name: Verify Plugin - LATEST
    if: github.ref_name == github.event.repository.default_branch
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2025.9.12

      # Cache verifier IDE binaries separately with a stable key (not invalidated by unrelated Gradle changes)
      # IDEs are stored by the IntelliJ Platform Gradle Plugin v2.x in ~/.gradle/caches/<gradle-version>/transforms/
      - name: Restore verifier IDEs cache
        uses: SonarSource/gh-action_cache@0666e03d7b6480758214db522a3aac989d67b026 # v1.7.0
        with:
          path: ~/.gradle/caches/*/transforms/
          key: verifier-ides-${{ runner.os }}-LATEST-${{ hashFiles('build.gradle.kts', 'gradle.properties') }}
          restore-keys: |
            verifier-ides-${{ runner.os }}-LATEST-
            verifier-ides-${{ runner.os }}-

      - name: Cache Gradle
        uses: SonarSource/gh-action_cache@0666e03d7b6480758214db522a3aac989d67b026 # v1.7.0
        with:
          path: |
            ~/.gradle/caches
            !~/.gradle/caches/*/transforms/
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-nightly-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-nightly-
            gradle-${{ runner.os }}-

      - name: Configure Gradle
        uses: SonarSource/ci-github-actions/config-gradle@71df716ff4caba2dbb7cd08a5f6fb932503602fc # 1.7.2
        with:
          sonar-platform: none
          use-develocity: true
          develocity-url: https://develocity.sonar.build
          artifactory-reader-role: private-reader
          disable-caching: 'true'

      - name: Run plugin verifier
        run: ./gradlew :verifyPlugin -PverifierEnv=LATEST

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verifier-reports-latest
          path: "**/reports/**/*"
          if-no-files-found: warn
